services:
  db:
    image: postgres:18.3
    container_name: monitoring-db
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgres
    environment:
      - POSTGRES_USER=pg
      - POSTGRES_PASSWORD=pg
      - POSTGRES_DB=pg
      - PGUSER=pg
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-d", "pg"]
      interval: 10s
      timeout: 30s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./frontend
    image: monitoring-frontend:latest
    container_name: monitoring-frontend
    volumes:
      - frontend-data:/srv

  api_server:
    build:
      context: ./backend
      dockerfile: ./Dockerfile.api
      args:
        DATABASE_URL: postgres://pg:pg@db:5432/pg
    image: monitoring-api_server:latest
    container_name: monitoring-api_server
    environment:
      - API_PORT=5000
      - DATABASE_URL=postgres://pg:pg@db:5432/pg
    depends_on:
      db:
        condition: service_healthy

  # collector:
  #   build:
  #     context: ./backend
  #     dockerfile: ./Dockerfile.collector
  #   image: monitoring-collector:latest
  #   container_name: monitoring-collector
  #   environment:
  #     - API_PORT=5000
  #     - API_ADDRESS=http://api_server
  #   volumes:
  #     - collector-data:/app
  #   depends_on:
  #     - api_server

  caddy:
    image: caddy:2.11.2-alpine
    container_name: caddy
    ports:
      - "80:80"
      - "433:433"
    volumes:
      - caddy-config:/config
      - caddy-data:/data
      - frontend-data:/srv
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - frontend
      - api_server

volumes:
  caddy-config:
  caddy-data:
  # collector-data:
  frontend-data:
  db-data:
